<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>AI Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
    #chat-container { width: 400px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.1); display: flex; flex-direction: column; height: 560px; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; line-height: 1.4; font-size: 14px; }
    .user { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 4px; }
    .bot  { align-self: flex-start; background: #e4e6eb; color: #1c1e21; border-bottom-left-radius: 4px; }
    #input-row { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #e4e6eb; }
    #input { flex: 1; padding: 10px 14px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 14px; }
    #send { padding: 10px 18px; background: #0084ff; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; }
    #send:disabled { opacity: .5; cursor: default; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="messages"></div>
    <div id="input-row">
      <input id="input" type="text" placeholder="Nhập tin nhắn..." />
      <button id="send">Gửi</button>
    </div>
  </div>

  <script>
    const messages = document.getElementById('messages');
    const input    = document.getElementById('input');
    const sendBtn  = document.getElementById('send');

    function addMsg(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      addMsg(text, 'user');
      input.value = '';
      sendBtn.disabled = true;

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        addMsg(data.reply, 'bot');
      } catch {
        addMsg('Lỗi kết nối server.', 'bot');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', e => e.key === 'Enter' && sendMessage());
  </script>
</body>
</html>

# ============================================================
# render.yaml — Render deployment configuration (Infrastructure as Code)
#
# Docs: https://render.com/docs/infrastructure-as-code
# ============================================================

services:
  - type: web
    name: ai-agent-render
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    # ============================================================
    # Environment variables đặt qua Render Dashboard hoặc render.yaml:
    #   envVars:
    #     - key: OPENAI_API_KEY
    #       sync: false   # nhập tay trên dashboard, không commit lên git
    # ============================================================
    envVars:
      - key: ENVIRONMENT
        value: production
